<!DOCTYPE html>
<html>
<head>

    <style>
        body { background-color: #000; color: white; text-align: center; font-family: sans-serif; padding: 20px; }

<body>

    <div class="card">

        <button class="btn" onclick="hividy()">HIRESAKA BIZINA (WhatsApp)</button>

    <script>
        function hividy() {
            let anarana = prompt("Iza ny anaranao Master?");

                let budget = prompt("Ohatrinona ny budget-nao (Ar)?");
                if (budget) {
                    alert("Ok " + anarana + "! Handefa hafatra any amin'i Fabian isika izao.");

                    window.location.href = "https://api.whatsapp.com/send?phone=261331654530&text=" + encodeURIComponent(hafatra);
                }
            }
        }
    </script>

</body>
